<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CoDeTT</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f3f3f3;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      position: relative;
    }

    .watermark {
      position: absolute;
      color: rgba(0, 0, 0, 0.08);
      font-size: 20px;
      transform: rotate(-45deg);
      user-select: none;
      pointer-events: none;
      line-height: 1.3;
      white-space: nowrap;
    }

    .wm1 { top: 20px; left: 320px; }
    .wm2 { top: 20px; right: 280px; }
    .wm3 { bottom: 30px; left: 360px; }
    .wm4 { bottom: 30px; right: 260px; }

    .container {
      width: min(1500px, 92vw);
      text-align: center;
      z-index: 1;
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 6vw, 90px);
      line-height: 1.08;
      font-weight: 400;
      letter-spacing: -0.03em;
      color: #2f2f2f;
    }

    .buttons {
      margin-top: 78px;
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 18px 34px;
      background: #2f2f2f;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-size: 24px;
      line-height: 1;
      box-shadow: 0 2px 0 rgba(0, 0, 0, 0.08);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .icon {
      width: 30px;
      height: 30px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
    }

    .icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    @media (max-width: 768px) {
      .buttons { margin-top: 44px; }
      .btn {
        font-size: 20px;
        padding: 15px 28px;
      }
      .icon {
        width: 24px;
        height: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="watermark wm1">Yingao.Wang<br>26.03.09</div>
  <div class="watermark wm2">Yingao.Wang<br>26.03.09</div>
  <div class="watermark wm3">Yingao.Wang<br>26.03.09</div>
  <div class="watermark wm4">Yingao.Wang<br>26.03.09</div>

  <main class="container">
    <h1>
      CoDeTT: A Context-Aware Decision Benchmark for<br>
      Turn-Taking Evaluation
    </h1>

    <div class="buttons">
      <a class="btn" href="https://arxiv.org/abs/2603.25434" target="_blank" rel="noopener noreferrer">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M6 2h7l5 5v15a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2zm7 1.5V8h4.5"></path><path d="M8 13h8v1.5H8zm0 3h8v1.5H8zm0-6h5v1.5H8z"></path></svg>
        </span>
        <span>Paper</span> 
      </a>

      <a class="btn" href="https://github.com/YingaoWang-casia/CoDeTT.git" target="_blank" rel="noopener noreferrer">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M12 .5C5.65.5.5 5.65.5 12a11.5 11.5 0 0 0 7.86 10.92c.58.11.79-.25.79-.56v-2.18c-3.2.7-3.88-1.36-3.88-1.36-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.15.08 1.76 1.18 1.76 1.18 1.02 1.74 2.68 1.24 3.33.95.1-.74.4-1.24.72-1.52-2.56-.29-5.24-1.28-5.24-5.7 0-1.26.45-2.28 1.18-3.09-.12-.29-.51-1.46.11-3.05 0 0 .96-.31 3.15 1.18a10.9 10.9 0 0 1 5.74 0c2.18-1.49 3.14-1.18 3.14-1.18.63 1.59.24 2.76.12 3.05.74.81 1.18 1.83 1.18 3.09 0 4.43-2.69 5.41-5.26 5.69.41.35.78 1.05.78 2.12v3.14c0 .31.21.67.8.56A11.5 11.5 0 0 0 23.5 12C23.5 5.65 18.35.5 12 .5z"></path></svg>
        </span>
        <span>Code</span>
      </a>

      <a class="btn" href="https://huggingface.co/datasets/YingaoWang-casia/CoDeTT" target="_blank" rel="noopener noreferrer">
        <span class="icon" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M4 5h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2zm0 2v10h16V7zm2 8 3.2-4 2.5 3 2.2-2.5L18 15z"></path><circle cx="8" cy="9" r="1.4"></circle></svg>
        </span>
        <span>Data</span>
      </a>
    </div>
  </main>
</body>
</html>
